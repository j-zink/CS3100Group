<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="signupstyle.css">
</head>
<body>
    <div class="container">
        <h1>Sign Up</h1>

        <div id="errorBox" class="error-message"></div>

        <form action="signup.php" method="POST">
            <div class="form-group">
                <label for="firstname">First Name</label>
                <input type="text" id="firstname" name="firstname" required>
            </div>
            <div class="form-group">
                <label for="lastname">Last Name</label>
                <input type="text" id="lastname" name="lastname" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" name="confirm" required>
            </div>
            <button type="submit">Sign Up</button>
        </form>

        <p class="login-link">Already have an account? <a href="index.html">Log in</a></p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const error = params.get("error");
        const field = params.get("field");

        const errorBox = document.getElementById("errorBox");

        const errorMessages = {
            missing_firstname: "Please enter your first name.",
            missing_lastname: "Please enter your last name.",
            missing_email: "Please enter your email address.",
            invalid_email: "Please enter a valid email address.",
            missing_password: "Please enter a password.",
            missing_confirm: "Please confirm your password.",
            password_mismatch: "Passwords do not match.",
            email_taken: "That email address is already registered.",
            server_error: "Something went wrong. Please try again."
        };

        if (error && errorMessages[error]) {
            errorBox.textContent = errorMessages[error];
        }

        if (field) {
            const input = document.getElementById(field);
            if (input) {
                input.classList.add("input-error");
            }
        }
    </script>
</body>
</html>
