<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="signupstyle.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>
<body>
    <div class="container">
        <h1>Sign Up</h1>

        <form action="signup.php" method="POST">
            <div class="form-group">
                <label for="firstname">First Name</label>
                <input type="text" id="firstname" name="firstname" required>
                <div class="field-error" id="firstname-error"></div>
            </div>

            <div class="form-group">
                <label for="lastname">Last Name</label>
                <input type="text" id="lastname" name="lastname" required>
                <div class="field-error" id="lastname-error"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                <div class="field-error" id="email-error"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
                <div class="field-error" id="password-error"></div>
            </div>

            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" name="confirm" required>
                <div class="field-error" id="confirm-error"></div>
            </div>

            <button type="submit">Sign Up</button>
        </form>

        <p class="login-link">Already have an account? <a href="index.html">Log in</a></p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);

        const error = params.get("error");
        const field = params.get("field");

        const firstname = params.get("firstname") || "";
        const lastname = params.get("lastname") || "";
        const email = params.get("email") || "";

        document.getElementById("firstname").value = firstname;
        document.getElementById("lastname").value = lastname;
        document.getElementById("email").value = email;

        const messages = {
            missing_firstname: "Please enter your first name.",
            long_firstname: "First name must be 20 characters or less.",
            missing_lastname: "Please enter your last name.",
            long_lastname: "Last name must be 20 characters or less.",
            missing_email: "Please enter your email address.",
            long_email: "Email must be 100 characters or less.",
            invalid_email: "Please enter a valid email address.",
            missing_password: "Please enter a password.",
            long_password: "Password is too long.",
            missing_confirm: "Please confirm your password.",
            password_mismatch: "Passwords do not match.",
            email_taken: "That email address is already registered.",
            server_error: "Something went wrong. Please try again."
        };

        if (field) {
            const input = document.getElementById(field);
            if (input) {
                input.classList.add("input-error");
            }

            const errorBox = document.getElementById(field + "-error");
            if (errorBox && messages[error]) {
                errorBox.textContent = messages[error];
            }
        }
    </script>
</body>
</html>
